name: Publish to PyPI

# S127-LECTION: NEVER trigger on push:tags. PyPI Trusted Publisher
# is active — any trigger change could publish to PyPI without Gruender-Go.
# Keep as workflow_dispatch only — this is the structural safeguard.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # for PyPI Trusted Publisher OIDC

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/langchain-cosmergon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (Trusted Publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
